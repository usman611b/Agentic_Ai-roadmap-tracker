<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic AI Engineering — 180-Day Mastery Roadmap</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0f14;--surface:#13161e;--surface2:#1a1e29;--surface3:#212636;
    --border:#2a2f3e;--border2:#343b50;--text:#e8eaf0;--text2:#9ca3b8;--text3:#5c6480;
    --accent:#7c6af7;--accent2:#a896ff;--green:#34d399;--green-dim:#1a4a38;
    --yellow:#fbbf24;--red:#f87171;--blue:#60a5fa;--pink:#f472b6;--orange:#fb923c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}

  .header{padding:36px 40px 24px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#080a0e 0%,var(--bg) 100%);position:relative;overflow:hidden}
  .header::before{content:'';position:absolute;top:-80px;left:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(124,106,247,.13) 0%,transparent 70%);pointer-events:none}
  .h-row1{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:20px}
  .h-eyebrow{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px}
  .h-title{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;line-height:1.1;letter-spacing:-.02em}
  .h-title span{color:var(--accent2)}
  .h-meta{font-size:12px;color:var(--text2);margin-top:5px}
  .h-meta b{color:var(--text)}

  .save-pill{display:flex;align-items:center;gap:6px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 10px;transition:all .3s;margin-bottom:8px}
  .save-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .saving .save-dot{background:var(--yellow);animation:blink .6s infinite}

  .overall-prog{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;min-width:230px}
  .op-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:7px}
  .op-nums{display:flex;align-items:baseline;gap:5px;margin-bottom:7px}
  .op-big{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent2)}
  .op-tot{font-size:13px;color:var(--text3)}
  .op-pct{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--green);margin-left:auto}
  .prog-bar{height:5px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .prog-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .5s cubic-bezier(.4,0,.2,1)}

  .phase-stats{display:flex;gap:7px;flex-wrap:wrap}
  .pstat{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .2s;white-space:nowrap}
  .pstat:hover{border-color:var(--border2);background:var(--surface2)}
  .pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .pstat-bar{width:40px;height:3px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .pstat-fill{height:100%;border-radius:99px}
  .pstat-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);min-width:26px;text-align:right}

  .main{display:flex;min-height:calc(100vh - 200px)}

  .sidebar{width:246px;flex-shrink:0;border-right:1px solid var(--border);padding:12px 0;position:sticky;top:0;height:100vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
  .sidebar::-webkit-scrollbar{width:3px}
  .sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
  .sb-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:10px 16px 4px}
  .nav-phase{margin:1px 8px;border-radius:8px}
  .nav-phase-hdr{display:flex;align-items:center;gap:8px;padding:7px 9px;cursor:pointer;border-radius:8px;transition:background .15s;user-select:none}
  .nav-phase-hdr:hover{background:var(--surface2)}
  .npdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .npname{font-size:12px;font-weight:600;color:var(--text2);flex:1}
  .nchev{font-size:9px;color:var(--text3);transition:transform .2s}
  .nav-phase.open .nchev{transform:rotate(90deg)}
  .nav-weeks{display:none;padding-left:14px}
  .nav-phase.open .nav-weeks{display:block}
  .nav-wk{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:11px;color:var(--text3);transition:background .15s}
  .nav-wk:hover{background:var(--surface2);color:var(--text2)}
  .nwnum{font-family:'IBM Plex Mono',monospace;font-size:10px;min-width:18px}

  .toolbar{display:flex;align-items:center;gap:9px;padding:11px 40px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;flex-wrap:wrap}
  .sw{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px;flex:1;max-width:280px;transition:border-color .15s}
  .sw:focus-within{border-color:var(--accent)}
  .si{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;flex:1}
  .si::placeholder{color:var(--text3)}
  .fbtn{display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
  .fbtn:hover{border-color:var(--border2);color:var(--text)}
  .fbtn.active{border-color:var(--accent);color:var(--accent2);background:rgba(124,106,247,.08)}
  .tb-right{margin-left:auto;display:flex;align-items:center;gap:12px;font-size:12px;color:var(--text3)}
  .tb-right b{color:var(--text2)}

  .content{flex:1;padding:26px 34px;max-width:850px}

  .phase-sec{margin-bottom:40px}
  .phase-hdr{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .phase-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
  .phase-num-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:1px}
  .phase-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;letter-spacing:-.01em}
  .phase-sub{font-size:12px;color:var(--text2);margin-top:1px}
  .phase-pw{min-width:120px;text-align:right;margin-left:auto}
  .phase-plbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);margin-bottom:3px}
  .phase-pnums{font-family:'Syne',sans-serif;font-size:19px;font-weight:700;margin-bottom:4px}
  .phase-pbar{height:3px;background:var(--surface3);border-radius:99px;overflow:hidden}
  .phase-pbfill{height:100%;border-radius:99px;transition:width .4s}

  .week-sec{margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:11px;overflow:hidden}
  .wk-hdr{display:flex;align-items:center;gap:9px;padding:11px 17px;background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;transition:background .15s}
  .wk-hdr:hover{background:var(--surface3)}
  .wk-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:2px 7px;border-radius:4px;background:var(--surface3);color:var(--text2);letter-spacing:.05em;flex-shrink:0}
  .wk-name{font-size:13px;font-weight:600;flex:1;color:var(--text)}
  .wk-prog{display:flex;align-items:center;gap:9px}
  .wk-mbar{width:68px;height:3px;background:var(--border);border-radius:99px;overflow:hidden}
  .wk-mfill{height:100%;border-radius:99px}
  .wk-pct{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);min-width:26px;text-align:right}
  .wk-chev{font-size:9px;color:var(--text3);transition:transform .2s;flex-shrink:0}
  .week-sec.open .wk-chev{transform:rotate(90deg)}
  .wk-days{display:none}
  .week-sec.open .wk-days{display:block}

  .dr{display:flex;align-items:flex-start;padding:10px 17px;border-bottom:1px solid var(--border);transition:background .15s;position:relative}
  .dr:last-child{border-bottom:none}
  .dr:hover{background:rgba(255,255,255,.02)}
  .dr.milestone{background:linear-gradient(90deg,rgba(124,106,247,.07),transparent 55%)}
  .dr.milestone:hover{background:linear-gradient(90deg,rgba(124,106,247,.11),transparent 55%)}
  .dr.done .dt{text-decoration:line-through;color:var(--text3)}
  .dr.done{opacity:.55}
  .cbwrap{padding-top:2px;margin-right:11px;flex-shrink:0}
  .cb{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .cb:hover{border-color:var(--accent)}
  .cb.checked{background:var(--accent);border-color:var(--accent)}
  .cb.checked::after{content:'';width:9px;height:5px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px)}
  .dc{flex:1;min-width:0}
  .dtop{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .dnum{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text3);min-width:34px;flex-shrink:0}
  .dt{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;flex:1}
  .mbadge{display:inline-flex;align-items:center;gap:3px;background:linear-gradient(135deg,rgba(124,106,247,.2),rgba(251,191,36,.15));border:1px solid rgba(124,106,247,.3);border-radius:4px;padding:2px 6px;font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--accent2);letter-spacing:.04em;flex-shrink:0}
  .dtasks{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
  .dtask{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text3);cursor:pointer;background:var(--surface3);border:1px solid var(--border);border-radius:4px;padding:3px 7px;transition:all .15s;user-select:none}
  .dtask:hover{border-color:var(--border2);color:var(--text2)}
  .dtask.checked{opacity:.5}
  .dtask.checked span{text-decoration:line-through}
  .tbox{width:10px;height:10px;border:1px solid var(--border2);border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
  .dtask.checked .tbox{background:var(--green);border-color:var(--green)}
  .dtask.checked .tbox::after{content:'✓';font-size:7px;color:white;line-height:1}
  .ddlv{margin-top:5px;display:flex;align-items:flex-start;gap:5px;font-size:11px;color:var(--text2)}
  .dlbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--green);background:var(--green-dim);padding:2px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-top:1px}
  .mstar{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.55;pointer-events:none}

  @keyframes cf{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(85px) rotate(720deg);opacity:0}}
  .cp{position:fixed;width:6px;height:6px;border-radius:1px;pointer-events:none;animation:cf 1s ease-out forwards;z-index:9999}

  @media(max-width:820px){.sidebar{display:none}.header,.content{padding:18px}.toolbar{padding:10px 18px}}
</style>
</head>
<body>

<div class="header">
  <div class="h-row1">
    <div>
      <div class="h-eyebrow">🤖 Your Daily Learning Tracker</div>
      <h1 class="h-title">Agentic AI <span>Engineering</span></h1>
      <div class="h-meta"><b>180-Day Mastery Roadmap</b> · 26 Weeks · 6 Phases · 500+ Tasks</div>
    </div>

      <div class="overall-prog">
        <div class="op-lbl">Overall Progress</div>
        <div class="op-nums">
          <span class="op-big" id="doneCount">0</span>

        </div>
        <div class="prog-bar"><div class="prog-fill" id="mainBar" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div class="phase-stats" id="phaseStats"></div>
</div>

<div class="toolbar">
  <div class="sw"><span style="color:var(--text3);font-size:13px">🔍</span><input class="si" type="text" placeholder="Search days, topics, tools…" id="searchInput" oninput="filterDays()"></div>

  <button class="fbtn" id="fPend" onclick="toggleFilter('pend')">⏳ Pending</button>

</div>

<div class="main">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="content" id="content"></div>
</div>

// ═══════════════════════════════════════════════════════ STORAGE
// localStorage persists in the browser permanently until cleared.
// Progress is saved automatically every time you check a box.
const SK_D='agentic_ai_days_v3', SK_T='agentic_ai_tasks_v3';
function loadState(){ try{return{d:JSON.parse(localStorage.getItem(SK_D)||'{}'),t:JSON.parse(localStorage.getItem(SK_T)||'{}')};}catch{return{d:{},t:{}};} }
let S=loadState(), saveTimer=null;

function persistSave(){
  clearTimeout(saveTimer);
  setSavePill('saving','Saving…');
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(SK_D,JSON.stringify(S.d));
      localStorage.setItem(SK_T,JSON.stringify(S.t));
      setSavePill('saved','Progress saved ✓');
    }catch(e){setSavePill('err','⚠ Storage full?');}
  },250);
}
function setSavePill(state,msg){
  const p=document.getElementById('savePill'),d=document.getElementById('saveDot'),t=document.getElementById('saveText');
  if(!p)return;
  p.className='save-pill'+(state==='saving'?' saving':'');
  d.style.background=state==='err'?'var(--red)':state==='saving'?'var(--yellow)':'var(--green)';
  t.textContent=msg;
}

// ═══════════════════════════════════════════════════════ HELPERS
function allDays(){const o=[];for(const p of PHASES)for(const w of p.weeks)for(const d of w.days)o.push(d);return o;}
const TOTAL=180;
function cntDone(){return Object.values(S.d).filter(Boolean).length;}
function cntMile(){return allDays().filter(d=>d.milestone&&S.d[d.n]).length;}

// ═══════════════════════════════════════════════════════ CONFETTI
function burst(target){
  if(!target)return;
  const r=target.getBoundingClientRect();
  const cols=['#7c6af7','#34d399','#fbbf24','#f472b6','#60a5fa','#fb923c'];
  for(let i=0;i<14;i++){
    const el=document.createElement('div');el.className='cp';
    el.style.cssText=`left:${r.left+Math.random()*r.width}px;top:${r.top+8}px;background:${cols[i%cols.length]};transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),1100);
  }
}

// ═══════════════════════════════════════════════════════ TOGGLE
function toggleDay(n){
  S.d[n]=!S.d[n];persistSave();
  const row=document.getElementById('dr-'+n);
  if(row){row.classList.toggle('done',!!S.d[n]);row.querySelector('.cb')?.classList.toggle('checked',!!S.d[n]);}
  updateProgress();
  if(S.d[n])burst(document.getElementById('dr-'+n));
}
function toggleTask(dn,i){
  const k=dn+'-'+i;S.t[k]=!S.t[k];persistSave();
  const el=document.getElementById('tk-'+dn+'-'+i);
  if(el){el.classList.toggle('checked',!!S.t[k]);el.querySelector('.tbox')?.classList.toggle('checked',!!S.t[k]);}
}

// ═══════════════════════════════════════════════════════ FILTERS
const AF=new Set();
function toggleFilter(f){
  AF.has(f)?AF.delete(f):AF.add(f);
  const map={mile:'fMile',pend:'fPend',done:'fDone'};
  document.getElementById(map[f])?.classList.toggle('active',AF.has(f));
  filterDays();
}
function filterDays(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.dr').forEach(row=>{
    const n=+row.dataset.n,isMile=row.dataset.mile==='1',isDone=!!S.d[n],txt=row.textContent.toLowerCase();
    let show=true;
    if(q&&!txt.includes(q))show=false;
    if(AF.has('mile')&&!isMile)show=false;
    if(AF.has('pend')&&isDone)show=false;
    if(AF.has('done')&&!isDone)show=false;
    row.style.display=show?'':'none';
  });
}

// ═══════════════════════════════════════════════════════ PROGRESS
function updateProgress(){
  const done=cntDone(),pct=Math.round(done/TOTAL*100);
  document.getElementById('doneCount').textContent=done;
  document.getElementById('donePct').textContent=pct+'%';
  document.getElementById('mainBar').style.width=pct+'%';
  document.getElementById('sDone').textContent=done;
  document.getElementById('sMile').textContent=cntMile();
  updatePhaseStats();updateBars();
}
function updatePhaseStats(){
  const c=document.getElementById('phaseStats');c.innerHTML='';
  for(const p of PHASES){
    if(!p.weeks.length)continue;
    const days=p.weeks.flatMap(w=>w.days),tot=days.length,dn=days.filter(d=>S.d[d.n]).length,pct=tot?Math.round(dn/tot*100):0;
    const el=document.createElement('div');el.className='pstat';
    el.innerHTML=`<span class="pdot" style="background:${p.color}"></span><b>${p.icon} Ph${p.num}</b><div class="pstat-bar"><div class="pstat-fill" style="width:${pct}%;background:${p.color}"></div></div><span class="pstat-pct">${pct}%</span>`;
    el.onclick=()=>document.getElementById(p.id)?.scrollIntoView({behavior:'smooth',block:'start'});
    c.appendChild(el);
  }
}
function updateBars(){
  for(const p of PHASES){
    const days=p.weeks.flatMap(w=>w.days),tot=days.length,dn=days.filter(d=>S.d[d.n]).length,pct=tot?Math.round(dn/tot*100):0;
    const f=document.getElementById('pf-'+p.id),nm=document.getElementById('pn-'+p.id);
    if(f)f.style.width=pct+'%';
    if(nm)nm.innerHTML=`<span style="color:${p.color}">${dn}</span><span style="color:var(--text3);font-size:13px">/${tot}</span>`;
    for(const w of p.weeks){
      const wdn=w.days.filter(d=>S.d[d.n]).length,wt=w.days.length,wp=wt?Math.round(wdn/wt*100):0;
      const wf=document.getElementById('wf-'+w.num),wpp=document.getElementById('wp-'+w.num);
      if(wf)wf.style.width=wp+'%';if(wpp)wpp.textContent=wp+'%';
    }
  }
}

// ═══════════════════════════════════════════════════════ SIDEBAR
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  sb.innerHTML='<div class="sb-lbl">Navigation</div>';
  for(const p of PHASES){
    if(!p.weeks.length)continue;
    const wrap=document.createElement('div');wrap.className='nav-phase';
    wrap.innerHTML=`<div class="nav-phase-hdr" onclick="this.parentElement.classList.toggle('open')">
      <span class="npdot" style="background:${p.color}"></span>
      <span class="npname">${p.icon} Phase ${p.num}</span>
      <span class="nchev">▶</span></div>
      <div class="nav-weeks">${p.weeks.map(w=>`<div class="nav-wk" onclick="document.getElementById('wk-${w.num}')?.scrollIntoView({behavior:'smooth',block:'start'})"><span class="nwnum">W${w.num}</span><span>${w.name.replace('Capstone Week','CW').split('—')[0].trim().substring(0,26)}</span></div>`).join('')}</div>`;
    sb.appendChild(wrap);
  }
}

// ═══════════════════════════════════════════════════════ CONTENT
function buildContent(){
  const c=document.getElementById('content');c.innerHTML='';
  for(const p of PHASES){
    if(!p.weeks.length)continue;
    const pDays=p.weeks.flatMap(w=>w.days),pTot=pDays.length,pDn=pDays.filter(d=>S.d[d.n]).length,pPct=pTot?Math.round(pDn/pTot*100):0;
    const sec=document.createElement('div');sec.className='phase-sec';sec.id=p.id;
    sec.innerHTML=`<div class="phase-hdr">
      <div class="phase-ico" style="background:${p.dim}">${p.icon}</div>
      <div><div class="phase-num-lbl">PHASE ${p.num}</div><div class="phase-name" style="color:${p.color}">${p.name}</div><div class="phase-sub">${p.subtitle}</div></div>
      <div class="phase-pw"><div class="phase-plbl">PROGRESS</div>
        <div class="phase-pnums" id="pn-${p.id}"><span style="color:${p.color}">${pDn}</span><span style="color:var(--text3);font-size:13px">/${pTot}</span></div>
        <div class="phase-pbar"><div class="phase-pbfill" id="pf-${p.id}" style="width:${pPct}%;background:${p.color}"></div></div>
      </div></div>`;

    for(const w of p.weeks){
      const wDn=w.days.filter(d=>S.d[d.n]).length,wTot=w.days.length,wPct=wTot?Math.round(wDn/wTot*100):0;
      const wSec=document.createElement('div');wSec.className='week-sec';wSec.id='wk-'+w.num;
      wSec.innerHTML=`<div class="wk-hdr" onclick="this.parentElement.classList.toggle('open')">
        <span class="wk-badge">WEEK ${w.num}</span>
        <span class="wk-name">${w.name}</span>
        <div class="wk-prog"><div class="wk-mbar"><div class="wk-mfill" id="wf-${w.num}" style="width:${wPct}%;background:${p.color}"></div></div><span class="wk-pct" id="wp-${w.num}">${wPct}%</span></div>
        <span class="wk-chev">▶</span></div>
        <div class="wk-days" id="wd-${w.num}"></div>`;

      const wd=wSec.querySelector('#wd-'+w.num);
      for(const d of w.days){
        const isDone=!!S.d[d.n];
        const row=document.createElement('div');
        row.className='dr'+(d.milestone?' milestone':'')+(isDone?' done':'');
        row.id='dr-'+d.n;row.dataset.n=d.n;row.dataset.mile=d.milestone?'1':'0';
        row.innerHTML=`<div class="cbwrap"><div class="cb${isDone?' checked':''}" onclick="toggleDay(${d.n})"></div></div>
          <div class="dc">
            <div class="dtop"><span class="dnum">Day ${d.n}</span><span class="dt">${d.title}</span>${d.milestone?'<span class="mbadge">⭐ MILESTONE</span>':''}</div>
            ${d.tasks?`<div class="dtasks">${d.tasks.map((t,i)=>`<div class="dtask${S.t[d.n+'-'+i]?' checked':''}" id="tk-${d.n}-${i}" onclick="toggleTask(${d.n},${i})"><div class="tbox${S.t[d.n+'-'+i]?' checked':''}"></div><span>${t}</span></div>`).join('')}</div>`:''}
            ${d.del?`<div class="ddlv"><span class="dlbl">📦 DELIVER</span>${d.del.replace('⭐ ','')}</div>`:''}
          </div>${d.milestone?'<span class="mstar">⭐</span>':''}`;
        wd.appendChild(row);
      }
      sec.appendChild(wSec);
    }
    c.appendChild(sec);
  }
}

// ═══════════════════════════════════════════════════════ INIT
buildSidebar();buildContent();updateProgress();

// Verify storage & show loaded message
try{
  localStorage.setItem('_chk','1');localStorage.removeItem('_chk');
  const done=cntDone();
  setSavePill('saved', done>0 ? `Loaded — ${done} days completed ✓` : 'Auto-saves on every checkbox ✓');
}catch(e){
  setSavePill('err','⚠ Storage unavailable in this browser');
}
</script>
</body>
</html>
